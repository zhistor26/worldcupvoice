params:
  - id: mimo_api_key
    type: secret
    name: MiMo API Key
    description: 小米 MiMo API Key（视觉解说 + 语音合成）
    required: true

  - id: agora_app_id
    type: string
    name: Agora App ID
    description: Agora 实时音视频项目 App ID
    required: true

  - id: agora_app_certificate
    type: secret
    name: Agora App Certificate
    description: Agora 项目证书
    required: true

  - id: backend_api_secret
    type: secret
    name: Backend API Secret
    description: 前后端 session API 共享密钥
    default_value: "$random(len=32)"
    required: true

  - id: vision_provider
    type: string
    name: Vision Provider
    description: "视觉：mimo（默认）或 openai"
    default_value: mimo
    required: false

  - id: tts_provider
    type: string
    name: TTS Provider
    description: "语音：mimo、fish_audio、elevenlabs、openai"
    default_value: mimo
    required: false
